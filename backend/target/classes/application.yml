server:
  port: 8080

spring:
  application:
    name: bmad-edge-gateway
  
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:bmad_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: 
  
  sql:
    init:
      mode: always
    
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  # Web Jackson DateTime Formatting
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # 开启 SQL 日志输出（开发环境便于验证租户拦截器效果）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰命名自动映射
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段配置
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
